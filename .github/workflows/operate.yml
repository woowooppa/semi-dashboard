## 지금 당장 확인하셔야 할 것

아직 **한 번도 확인 못 한 게 있습니다.**

**1. 새 파일들이 저장소에 올라갔는지**

시계열 차트, 진입 게이트, 현물가 1년치, 운영 매뉴얼 — 이 대화에서 만든 것들이 아직 로컬에만 있을 수 있습니다.

```bash
git status --short
git add . && git commit -m "전체 갱신" && git pull --rebase && git push
```

**2. Actions가 실제로 성공했는지**

`Actions` 탭 → `데이터 갱신` → 최근 실행이 초록 체크인지.

**3. `data.json`의 `errors` 배열**

저장소 → `data/data.json` → 맨 아래.

```json
"errors": []
```

비어 있으면 완료입니다. **뭔가 들어 있으면 그 줄을 알려주세요.**

앞서 세 번 여쭤봤는데 아직 결과를 못 들었습니다. RSS 주소가 깨져 있을 가능성이 높은데, 확인이 안 되면 뉴스만 조용히 비어 있는 상태로 계속 돌아갑니다.