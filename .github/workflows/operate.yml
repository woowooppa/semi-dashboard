## 왜 이건 자동화가 안 되나

**돈이 되는 데이터는 전부 유료거나 읽어야 하는 것이기 때문입니다.**

- 현물가·계약가 → TrendForce 유료
- 선행 P/E → 애널리스트 컨센서스, 유료
- Bit Growth·ASP → IR 자료를 사람이 읽어야 함

자동화된 건 **공짜로 풀린 것들**이고, 판단을 바꾸는 데이터는 대부분 수기입니다. 설계 실패가 아니라 이 분야 데이터 시장의 구조예요.

